[package]
name = "hanui"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "hanui"
path = "src/main.rs"

[lib]
name = "hanui"
path = "src/lib.rs"

[dependencies]
slint = { version = "1.16.1", default-features = false, features = ["std", "compat-1-2", "renderer-software", "backend-winit-x11"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
jiff = "0.2"
smol_str = "0.3"
# SVG rasterization for icon resolver (TASK-010).
# These three crates are already pulled in transitively by slint; pinning them
# as direct deps makes the version dependency explicit and keeps cargo from
# silently upgrading the transitive copy out from under our code.
resvg = "0.47"
usvg = "0.47"
tiny-skia = "0.12"
