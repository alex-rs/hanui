version: 1
device_profile: desktop
default_view: home
# Phase 6 acceptance fixture (TASK-112): power_flow widget at idle state.
views:
  - id: home
    title: Home
    layout: sections
    sections:
      - id: main
        title: Main
        grid:
          columns: 4
          gap: 8
        widgets:
          - id: power_flow_idle
            type: power_flow
            entity: sensor.grid_power
            options:
              power_flow:
                grid_entity: sensor.grid_power
                solar_entity: sensor.solar_power
                battery_entity: sensor.battery_power
                battery_soc_entity: sensor.battery_soc
                home_entity: sensor.home_power
            layout:
              preferred_columns: 2
              preferred_rows: 2
