version: 1
device_profile: desktop
default_view: home
# Phase 6 acceptance fixture (TASK-112): media_player widget at idle state.
views:
  - id: home
    title: Home
    layout: sections
    sections:
      - id: main
        title: Main
        grid:
          columns: 4
          gap: 8
        widgets:
          - id: media_player_idle
            type: media_player
            entity: media_player.tv
            options:
              media_player:
                transport_set: [play, pause, next, prev]
                volume_step: 0.05
            layout:
              preferred_columns: 2
              preferred_rows: 1
