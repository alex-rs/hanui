# Home Assistant configuration for the hanui local dev target (Phase 2.5).
#
# Goal: declare exactly the four entities named in examples/ha-states.json
# (`light.kitchen`, `sensor.hallway_temperature`, `switch.outlet_1`,
# `binary_sensor.foo`) so `cargo run` (live target) renders the same
# dashboard as `cargo run --fixture examples/ha-states.json`.
#
# Mechanism per entity:
#   - light.kitchen              — template:light backed by input_boolean.kitchen_light
#   - sensor.hallway_temperature — template:sensor reading input_number.hallway_temp
#   - switch.outlet_1            — template:switch backed by input_boolean.outlet_1
#   - binary_sensor.foo          — template:binary_sensor backed by input_boolean.foo
#
# `default_entity_id` is the explicit override that pins the resulting
# entity_id (otherwise HA would derive `light.kitchen_light` from the name).
# This is the same `default_entity_id` field MQTT migrated to in 2026.4.
#
# Phase 3 compatibility: the template light + switch declare working
# `turn_on` / `turn_off` actions that mutate the backing input_boolean.
# A future `call_service` from the hanui app to e.g. `light.turn_on
# entity_id=light.kitchen` therefore round-trips into observable state.
#
# DO NOT add real secrets to this file — it is tracked. Any auth tokens,
# API keys, or credentials must go in `secrets.yaml` (gitignored by
# ops/ha/.gitignore) and be referenced via `!secret <key>` in this file.

# Default HA configuration — enables the frontend, HTTP API, and the
# onboarding flow that ops/ha/provision-ha.sh (TASK-052) will use to
# bootstrap the admin user and a long-lived access token.
default_config:

# Frontend / API are pulled in by default_config; binding 0.0.0.0 lets the
# host reach HA through the VM's port forward.
http:
  server_host: 0.0.0.0
  server_port: 8123

# HA requires automations.yaml to exist; we declare an empty stub.
automation: !include automations.yaml

# === Backing helpers (writable state) ===
input_boolean:
  kitchen_light:
    name: Kitchen Light state
    initial: true
  outlet_1:
    name: Outlet 1 state
    initial: false
  foo:
    name: Binary sensor foo state
    initial: false

input_number:
  hallway_temp:
    name: Hallway temperature value
    initial: 21.3
    min: -50
    max: 100
    step: 0.1
    unit_of_measurement: "°C"

# === Canonical entities (modern template: block syntax) ===
template:
  - light:
      - name: "Kitchen Light"
        unique_id: hanui_light_kitchen
        default_entity_id: light.kitchen
        state: "{{ is_state('input_boolean.kitchen_light', 'on') }}"
        turn_on:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.kitchen_light
        turn_off:
          action: input_boolean.turn_off
          target:
            entity_id: input_boolean.kitchen_light

  - switch:
      - name: "Outlet 1"
        unique_id: hanui_switch_outlet_1
        default_entity_id: switch.outlet_1
        state: "{{ is_state('input_boolean.outlet_1', 'on') }}"
        turn_on:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.outlet_1
        turn_off:
          action: input_boolean.turn_off
          target:
            entity_id: input_boolean.outlet_1

  - sensor:
      - name: "Hallway Temperature"
        unique_id: hanui_sensor_hallway_temperature
        default_entity_id: sensor.hallway_temperature
        state: "{{ states('input_number.hallway_temp') }}"
        unit_of_measurement: "°C"
        device_class: temperature

  - binary_sensor:
      - name: "Binary Sensor Foo"
        unique_id: hanui_binary_sensor_foo
        default_entity_id: binary_sensor.foo
        state: "{{ is_state('input_boolean.foo', 'on') }}"
