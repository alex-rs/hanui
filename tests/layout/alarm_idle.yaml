version: 1
device_profile: desktop
default_view: home
# Phase 6 acceptance fixture (TASK-112): alarm widget at idle (disarmed) state.
views:
  - id: home
    title: Home
    layout: sections
    sections:
      - id: main
        title: Main
        grid:
          columns: 4
          gap: 8
        widgets:
          - id: alarm_idle
            type: alarm
            entity: alarm_control_panel.home
            options:
              alarm:
                pin_policy:
                  required_on_disarm:
                    length: 4
                    code_format: number
            layout:
              preferred_columns: 2
              preferred_rows: 1
