version: 1
device_profile: desktop
home_assistant:
  url: "ws://homeassistant.local:8123/api/websocket"
  token_env: HA_TOKEN
theme:
  mode: dark
  accent: "#03a9f4"
default_view: home

views:
  - id: home
    title: Home
    layout: sections
    sections:
      - id: overview
        title: Overview
        grid:
          columns: 4
          gap: 8
        widgets:
          - id: living_room_light
            type: light_tile
            entity: light.living_room
            name: "Living Room"
            icon: "mdi:ceiling-light"
            visibility: always
            tap_action:
              action: call-service
              domain: light
              service: turn_on
              target: light.living_room
            hold_action:
              action: more-info
            double_tap_action:
              action: none
            layout:
              preferred_columns: 2
              preferred_rows: 1

          - id: kitchen_light
            type: light_tile
            entity: light.kitchen
            name: "Kitchen"
            icon: "mdi:lightbulb"
            visibility: always
            tap_action:
              action: toggle
            hold_action:
              action: more-info
            double_tap_action:
              action: none
            layout:
              preferred_columns: 2
              preferred_rows: 1

          - id: outdoor_temperature
            type: sensor_tile
            entity: sensor.outdoor_temperature
            name: "Outdoor Temp"
            icon: "mdi:thermometer"
            visibility: always
            tap_action:
              action: more-info
            hold_action:
              action: more-info
            double_tap_action:
              action: none
            layout:
              preferred_columns: 1
              preferred_rows: 1

          - id: hallway_temperature
            type: sensor_tile
            entity: sensor.hallway_temperature
            name: "Hallway Temp"
            icon: "mdi:thermometer"
            visibility: always
            tap_action:
              action: more-info
            hold_action:
              action: none
            double_tap_action:
              action: none
            layout:
              preferred_columns: 1
              preferred_rows: 1

          - id: ha_docs_link
            type: entity_tile
            entity: sensor.ha_version
            name: "HA Docs"
            icon: "mdi:home-assistant"
            visibility: always
            tap_action:
              action: url
              href: "https://www.home-assistant.io/"
            hold_action:
              action: more-info
            double_tap_action:
              action: none
            layout:
              preferred_columns: 2
              preferred_rows: 1

      - id: climate
        title: Climate
        grid:
          columns: 4
          gap: 8
        widgets:
          - id: living_room_fan
            type: fan
            entity: fan.living_room
            name: "Living Room Fan"
            icon: "mdi:fan"
            visibility: always
            tap_action:
              action: call-service
              domain: fan
              service: turn_on
              target: fan.living_room
            hold_action:
              action: more-info
            double_tap_action:
              action: none
            layout:
              preferred_columns: 2
              preferred_rows: 2
            options:
              fan:
                speed_count: 3
                preset_modes:
                  - "low"
                  - "medium"
                  - "high"

          - id: bedroom_camera
            type: camera
            entity: camera.bedroom
            name: "Bedroom Camera"
            icon: "mdi:camera"
            visibility: profile:desktop
            tap_action:
              action: more-info
            hold_action:
              action: none
            double_tap_action:
              action: none
            layout:
              preferred_columns: 2
              preferred_rows: 2
            options:
              camera:
                interval_seconds: 10
                url: "http://homeassistant.local:8123/api/camera_proxy/camera.bedroom"

          - id: energy_history
            type: history
            entity: sensor.energy_consumption
            name: "Energy (24h)"
            icon: "mdi:lightning-bolt"
            visibility: always
            tap_action:
              action: more-info
            hold_action:
              action: none
            double_tap_action:
              action: none
            layout:
              preferred_columns: 4
              preferred_rows: 2
            options:
              history:
                window_seconds: 86400
                max_points: 120

          - id: living_room_thermostat
            type: climate
            entity: climate.living_room
            name: "Living Room"
            icon: "mdi:thermostat"
            visibility: always
            tap_action:
              action: more-info
            hold_action:
              action: none
            double_tap_action:
              action: none
            layout:
              preferred_columns: 2
              preferred_rows: 2
            options:
              climate:
                min_temp: 16.0
                max_temp: 30.0
                step: 0.5
                hvac_modes:
                  - heat
                  - cool
                  - heat_cool
                  - off

  - id: security
    title: Security
    layout: sections
    sections:
      - id: access
        title: Access Control
        grid:
          columns: 4
          gap: 8
        widgets:
          - id: front_door_lock
            type: lock
            entity: lock.front_door
            name: "Front Door"
            icon: "mdi:door-closed-lock"
            visibility: always
            tap_action:
              action: call-service
              domain: lock
              service: lock
              target: lock.front_door
            hold_action:
              action: more-info
            double_tap_action:
              action: none
            layout:
              preferred_columns: 2
              preferred_rows: 1
            options:
              lock:
                pin_policy:
                  required:
                    length: 4
                    code_format: number
                require_confirmation_on_unlock: true

          - id: garage_door_lock
            type: lock
            entity: lock.garage_door
            name: "Garage Door"
            icon: "mdi:garage"
            visibility: always
            tap_action:
              action: call-service
              domain: lock
              service: lock
              target: lock.garage_door
            hold_action:
              action: more-info
            double_tap_action:
              action: none
            layout:
              preferred_columns: 2
              preferred_rows: 1
            options:
              lock:
                pin_policy: none

          - id: patio_cover
            type: cover
            entity: cover.patio
            name: "Patio Cover"
            icon: "mdi:window-shutter"
            visibility: always
            tap_action:
              action: more-info
            hold_action:
              action: none
            double_tap_action:
              action: none
            layout:
              preferred_columns: 2
              preferred_rows: 1
            options:
              cover:
                position_min: 0
                position_max: 100

      - id: alarm
        title: Alarm
        grid:
          columns: 4
          gap: 8
        widgets:
          - id: home_alarm
            type: alarm
            entity: alarm_control_panel.home
            name: "Home Alarm"
            icon: "mdi:shield-home"
            visibility: always
            tap_action:
              action: call-service
              domain: alarm_control_panel
              service: alarm_arm_home
              target: alarm_control_panel.home
            hold_action:
              action: more-info
            double_tap_action:
              action: none
            layout:
              preferred_columns: 4
              preferred_rows: 1
            options:
              alarm:
                pin_policy:
                  required_on_disarm:
                    length: 4
                    code_format: number

          - id: motion_sensor_front
            type: sensor_tile
            entity: binary_sensor.motion_front_door
            name: "Front Motion"
            icon: "mdi:motion-sensor"
            visibility: always
            tap_action:
              action: more-info
            hold_action:
              action: more-info
            double_tap_action:
              action: none
            layout:
              preferred_columns: 2
              preferred_rows: 1

  - id: media
    title: Media
    layout: sections
    sections:
      - id: players
        title: Media Players
        grid:
          columns: 4
          gap: 8
        widgets:
          - id: living_room_tv
            type: media_player
            entity: media_player.living_room_tv
            name: "Living Room TV"
            icon: "mdi:television-play"
            visibility: always
            tap_action:
              action: more-info
            hold_action:
              action: none
            double_tap_action:
              action: none
            layout:
              preferred_columns: 4
              preferred_rows: 2
            options:
              media_player:
                transport_set:
                  - play
                  - pause
                  - stop
                  - next
                  - prev
                volume_step: 0.05

  - id: energy
    title: Energy
    layout: sections
    sections:
      - id: power_overview
        title: Power Overview
        grid:
          columns: 4
          gap: 8
        widgets:
          - id: home_power_flow
            type: power_flow
            name: "Power Flow"
            icon: "mdi:lightning-bolt-circle"
            visibility: always
            tap_action:
              action: more-info
            hold_action:
              action: none
            double_tap_action:
              action: none
            layout:
              preferred_columns: 4
              preferred_rows: 3
            options:
              power_flow:
                grid_entity: sensor.grid_power
                solar_entity: sensor.solar_power
                battery_entity: sensor.battery_power
                battery_soc_entity: sensor.battery_soc
                home_entity: sensor.home_power
