version: 1
device_profile: desktop
default_view: home
# Phase 6 acceptance fixture (TASK-112): history widget at idle state.
views:
  - id: home
    title: Home
    layout: sections
    sections:
      - id: main
        title: Main
        grid:
          columns: 4
          gap: 8
        widgets:
          - id: history_idle
            type: history
            entity: sensor.energy_kwh
            options:
              history:
                window_seconds: 86400
                max_points: 60
            layout:
              preferred_columns: 2
              preferred_rows: 2
