# ci.yml — per-PR gate set for hanui Phase 1+4
#
# This is the authoritative rule book for Phase 1+4. When a remote is added,
# this file runs unchanged on GitHub Actions.
#
# Gate set:
#   1. rustfmt            — formatting enforced
#   2. clippy             — warnings-as-errors
#   3. schema-doc cotravel — any PR touching src/dashboard/schema.rs must also touch
#                            docs/DASHBOARD_SCHEMA.md (and vice versa), scoped to
#                            field additions/removals (Risk #12 mitigation, TASK-093).
#                            Self-test runs first so a broken script never silently passes.
#                            Blast-radius: <1 PR/month post-lock. FP rate: <1%.
#   4. forbidden-tokens   — blocks .only/.skip/xit/fdescribe/#[allow(dead_code)]
#                           unless accompanied by waiver (ISSUE-### + docs/waivers.yaml)
#   5. gitleaks           — secret scan on full repo history
#   6. hex-color grep     — bans inline hex literals in ui/slint/**/*.slint;
#                           escape hatch: "// theme-allow:" restricted to theme.slint only
#   7. serde_json crate   — bans any serde_json crate path under src/ui/**
#   8. cargo test         — full unit + integration test suite (TZ=UTC, two-pass for
#                           order-dependence detection)
#   9. coverage ratchet   — per-file line coverage must not drop below coverage/baseline.json;
#                           cargo-llvm-cov@0.8.5 generates coverage/current.json, then
#                           ops/checks/coverage-ratchet.js enforces per-file pct >= baseline.
#                           Ratchet regression tests run first so a broken ratchet script
#                           does not silently pass.
#                           Blast-radius: ~5% of PRs that reduce test coverage for changed
#                           files. FP rate: <1% (floating-point epsilon handled by script).
#
# Budget: <5 min wall clock on a cold runner (Swatenim/rust-cache warms subsequent runs).
# cargo-llvm-cov binary cached via taiki-e/install-action; adds ~30s on first run.
# Toolchain: pinned to 1.95.0 to match the dev VM rustc (per TASK-002).
# llvm-tools-preview component added to test job only (required by cargo-llvm-cov).
#
# Failure blast-radius:
#   - fmt/clippy: estimated ~20% of PRs on first-pass (formatting drift). FP rate: 0%.
#   - grep gates: ~5% of PRs when ui/slint files exist. FP rate: <1% (URL fragments in
#     comments are the only known false-positive vector; Slint files rarely contain URLs).
#   - cargo test: should be ~0% on green master. FP rate: 0% (deterministic).
#   - coverage ratchet: ~5% of PRs that reduce per-file coverage. FP rate: <1%.

name: ci

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:
  # Nightly at 02:00 UTC — runs sbc-cpu-smoke (and any future nightly-only jobs).
  # PR jobs are filtered out via `if: github.event_name != 'schedule'`
  # (the sbc-cpu-smoke job is the inverse: only runs on schedule/dispatch).
  schedule:
    - cron: '0 2 * * *'

# Cancel in-flight runs for the same PR/branch on new push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Determinism: all steps run at UTC.
  TZ: UTC
  CARGO_TERM_COLOR: always

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job: lint
  # Mirrors lefthook pre-commit coverage: rustfmt, clippy, forbidden-tokens,
  # gitleaks. These run first so the feedback loop is as short as possible.
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Rust toolchain (pinned to match dev VM per TASK-002) ──────────────────
      - name: setup Rust 1.95.0
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      # ── System libs required by Slint transitive deps ────────────────────────
      # yeslogic-fontconfig-sys (via font-kit → fontconfig) and several xcb/x11
      # crates require C dev headers that ubuntu-latest does not ship. This list
      # mirrors the packages verified on the Debian 12 dev VM in TASK-002.
      # --no-install-recommends keeps the install lean (~70 MB vs ~300 MB).
      # pkg-config and cmake are typically pre-installed on ubuntu-latest but
      # listing them here is harmless and prevents silent drift if the runner
      # image changes.
      - name: install Slint system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev \
            libfreetype6-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxkbcommon-x11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libxinerama-dev \
            pkg-config \
            cmake

      # Cache cargo registry + compiled deps to stay within <5 min budget.
      - name: cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      # ── rustfmt ──────────────────────────────────────────────────────────────
      - name: cargo fmt check
        run: cargo fmt --check

      # ── clippy ───────────────────────────────────────────────────────────────
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      # ── schema-doc co-travel ─────────────────────────────────────────────────
      # Enforces locked_decisions.schema_finalization_gate part (b) from
      # docs/plans/2026-04-29-phase-4-layout.md (TASK-093):
      # any PR that adds/removes a field declaration in src/dashboard/schema.rs
      # must also add/remove a field heading in docs/DASHBOARD_SCHEMA.md (and
      # vice versa). Scoped to field additions/removals (Risk #12 mitigation) so
      # doc-only typo PRs pass. Self-test runs first so a broken script never
      # silently passes.
      #
      # Blast-radius: PRs touching src/dashboard/schema.rs or docs/DASHBOARD_SCHEMA.md
      # without the paired file change. Expected frequency: <1 PR/month once the
      # schema is locked (Phase 4 freeze). FP rate: <1% (structured-grep scoping).
      #
      # Runs only on pull_request events (not on push to main) so the merge commit
      # itself — which has no "base ref" in the same sense — is not checked.
      - name: schema-doc cotravel (self-test)
        if: github.event_name == 'pull_request'
        run: bash ops/checks/schema-doc-cotravel.sh --self-test

      - name: schema-doc cotravel
        if: github.event_name == 'pull_request'
        run: bash ops/checks/schema-doc-cotravel.sh

      # ── forbidden-tokens ─────────────────────────────────────────────────────
      # Checks for forbidden tokens that require a waiver entry in docs/waivers.yaml
      # plus an ISSUE-### reference on an adjacent line.
      #
      # Two invocations:
      #   (a) ops/checks/forbidden-tokens.sh — covers TS/JS/Go files.
      #       NOTE: the script exits 0 when called with no arguments (CI has no
      #       "staged files" concept). In a Rust-only repo this step is a no-op
      #       but is preserved so the gate fires correctly in polyglot phases.
      #   (b) Inline Rust scan — the shared script does not cover .rs files;
      #       this step fills the gap. Catches #[allow(dead_code)] without a
      #       waiver, plus .only/.skip/xit/fdescribe in case test macros appear.
      #       The pre-receive hook is the authoritative enforcement; this CI
      #       step provides a fast fail-on-PR signal.
      - name: forbidden-tokens check (TS/JS/Go via ops/checks script)
        if: hashFiles('ops/checks/forbidden-tokens.sh') != ''
        run: |
          # Collect all TS/JS/Go source files for the script to scan.
          SRCFILES=$(find . -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" \
            -o -name "*.jsx" -o -name "*.go" \) \
            ! -path "*/node_modules/*" ! -path "*/vendor/*" ! -path "*/.git/*" \
            2>/dev/null | tr '\n' ' ')
          if [ -n "$SRCFILES" ]; then
            # shellcheck disable=SC2086
            bash ops/checks/forbidden-tokens.sh $SRCFILES
          else
            echo "forbidden-tokens (TS/JS/Go): no matching source files — skipping"
          fi

      - name: forbidden-tokens check (Rust)
        run: |
          # Scan Rust source files for #[allow(dead_code)] without a waiver reference.
          # A waiver requires: ISSUE-### on an adjacent line AND a docs/waivers.yaml entry.
          # The pre-receive hook re-runs this check server-side; --no-verify does NOT skip it.
          # Other forbidden tokens (.only/.skip/xit/fdescribe) are enforced by the pre-receive
          # hook; the shared ops/checks script covers them for TS/JS/Go files above.
          FOUND=0
          while IFS= read -r -d '' f; do
            # #[allow(dead_code)] without an adjacent ISSUE-### reference.
            while IFS= read -r match; do
              [ -z "$match" ] && continue
              LINE_NO=$(printf '%s' "$match" | cut -d: -f1)
              PREV=$((LINE_NO > 1 ? LINE_NO - 1 : 1))
              NEXT=$((LINE_NO + 1))
              CONTEXT=$(sed -n "${PREV},${NEXT}p" "$f" 2>/dev/null || true)
              if printf '%s' "$CONTEXT" | grep -qE 'ISSUE-[0-9]+'; then
                continue  # waiver reference present
              fi
              printf '[forbidden-tokens] %s:%s: #[allow(dead_code)] requires ISSUE-### + waivers.yaml entry\n' "$f" "$LINE_NO"
              FOUND=1
            done < <(grep -nE '#\[allow\(dead_code\)\]' "$f" 2>/dev/null || true)
          done < <(find . -name "*.rs" ! -path "*/.git/*" ! -path "*/target/*" -print0 2>/dev/null)
          if [ "$FOUND" -ne 0 ]; then
            printf '\n[forbidden-tokens] Rust violations found. Fix or add waivers.\n'
            exit 1
          fi
          echo "forbidden-tokens (Rust): OK"

      # ── gitleaks ─────────────────────────────────────────────────────────────
      # Full-history secret scan. Version pinned to 8.25.1 for reproducibility.
      - name: gitleaks secret scan
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.25.1/gitleaks_8.25.1_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --no-git=false --redact \
            || { echo "gitleaks: secret detected — blocking"; exit 1; }

  # ────────────────────────────────────────────────────────────────────────────
  # Job: repo-rules
  # Hanui-specific grep gates that enforce architectural invariants.
  # These are intentionally a separate job so they can be required status
  # checks independently, and so their failure messages are distinct.
  #
  # Gate 1 — hex-color:
  #   Rejects any inline hex literal (#xxx, #xxxxxx, #xxxxxxxx) in
  #   ui/slint/**/*.slint. The ONLY escape hatch is a "// theme-allow:"
  #   comment on the SAME line AND only in ui/slint/theme.slint. Any other
  #   file with "// theme-allow:" still fails — the marker is not a general
  #   bypass; it is semantically restricted to the theme file.
  #   Blast-radius: ~5% of PRs once UI files exist. FP rate: <1%.
  #
  # Gate 2 — serde_json crate-path ban:
  #   Rejects any occurrence of the serde_json crate path under src/ui/**.
  #   Pattern: \bserde_json\b catches all forms:
  #     - `use serde_json::Value;`
  #     - `use serde_json::{Map, Value};`  (grouped import — old pattern missed this)
  #     - `serde_json :: Value` (unusual whitespace)
  #   The prior \bserde_json\s*::\s*Value\b pattern was a type-name ban that
  #   could be evaded by calling Value methods without naming the type. This
  #   crate-path ban closes that evasion: any future legitimate use of
  #   serde_json in src/ui/ requires an explicit waiver in docs/waivers.yaml.
  #   Blast-radius: ~1% of PRs. FP rate: 0% (pattern is precise).
  # ────────────────────────────────────────────────────────────────────────────
  repo-rules:
    name: repo-rules
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Gate 1: No inline hex color literals in ui/slint/**/*.slint ──────────
      # The escape hatch "// theme-allow:" is valid ONLY in ui/slint/theme.slint.
      # For all other .slint files the pattern must produce zero matches.
      - name: hex-color gate (no inline hex in ui/slint)
        run: |
          HEX_PATTERN='#([0-9a-fA-F]{8}|[0-9a-fA-F]{6}|[0-9a-fA-F]{3})\b'
          VIOLATIONS=""

          # Find all .slint files. If none exist, gate passes vacuously.
          while IFS= read -r -d '' f; do
            if [[ "$f" == */ui/slint/theme.slint ]]; then
              # theme.slint: lines with "// theme-allow:" are exempt.
              matches=$(grep -nE "$HEX_PATTERN" "$f" | grep -v '// theme-allow:' || true)
            else
              # Every other .slint file: no escape hatch.
              matches=$(grep -nE "$HEX_PATTERN" "$f" || true)
            fi
            if [ -n "$matches" ]; then
              VIOLATIONS="${VIOLATIONS}=== ${f} ===\n${matches}\n"
            fi
          done < <(find . -path "*/ui/slint/*.slint" -print0 2>/dev/null)

          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: Inline hex color literals found in ui/slint/**/*.slint"
            echo "Use theme tokens instead. Escape hatch (// theme-allow:) is"
            echo "restricted to ui/slint/theme.slint ONLY."
            echo ""
            printf "%b" "$VIOLATIONS"
            exit 1
          fi
          echo "hex-color gate: OK (zero matches)"

      # ── Gate 2: No serde_json crate path in src/ui/** ───────────────────────
      # The bridge must operate exclusively on typed view-model structs.
      # Any use of serde_json in src/ui/ requires a waiver in docs/waivers.yaml.
      - name: serde_json gate (no serde_json under src/ui)
        run: |
          SERDE_PATTERN='\bserde_json\b'
          # Self-test: pattern must match all three variants.
          for VARIANT in 'use serde_json::Value;' 'use serde_json::{Map, Value};' 'serde_json :: Value'; do
            if ! echo "$VARIANT" | grep -qE "$SERDE_PATTERN"; then
              echo "ERROR: regex self-test failed for: $VARIANT"
              exit 1
            fi
          done
          echo "regex self-test: OK"
          VIOLATIONS=$(grep -rEn "$SERDE_PATTERN" src/ui/ 2>/dev/null || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: serde_json found in src/ui/**"
            echo "The UI bridge must use typed view-model structs, not raw JSON values."
            echo "JSON parsing belongs in the fixture/data layer, not in src/ui."
            echo "Any future legitimate use requires an explicit waiver in docs/waivers.yaml."
            echo ""
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "serde_json gate: OK (zero matches)"

  # ────────────────────────────────────────────────────────────────────────────
  # Job: test
  # Full test suite with determinism double-run (two seeds, randomized order).
  # Depends on lint + repo-rules so tests don't run on obviously broken code.
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: test
    runs-on: ubuntu-latest
    needs: [lint, repo-rules]
    env:
      TZ: UTC

    steps:
      - uses: actions/checkout@v4

      # ── Rust toolchain (pinned) ───────────────────────────────────────────────
      # llvm-tools-preview is required by cargo-llvm-cov to instrument binaries.
      - name: setup Rust 1.95.0
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: llvm-tools-preview

      # ── System libs required by Slint transitive deps ────────────────────────
      # Same package set as the lint job. Repeated here because the test job
      # runs on a fresh runner instance and cargo build will re-link against
      # these headers. Cache restores compiled artifacts but not system libs.
      - name: install Slint system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev \
            libfreetype6-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxkbcommon-x11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libxinerama-dev \
            pkg-config \
            cmake

      # Cache cargo artifacts (shared key with lint job).
      - name: cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      # ── cargo test (pass 1) ───────────────────────────────────────────────────
      # First pass with a fixed seed. TZ=UTC enforced at job level.
      - name: cargo test (pass 1)
        run: cargo test

      # ── cargo test (pass 2) ───────────────────────────────────────────────────
      # Second pass detects state-pollution failures (tests that rely on global
      # mutable state left by a prior test). Note: cargo test does not support
      # a --shuffle flag natively, so this does not detect order-dependence in
      # the strict sense — it catches pollution of global/static state between
      # runs. True order-dependence detection requires an external harness
      # (tracked in nightly backlog).
      - name: cargo test (pass 2 — state-pollution detection)
        run: cargo test

      # ── coverage ratchet ─────────────────────────────────────────────────────
      # Enforces per-file line coverage >= coverage/baseline.json.
      # Steps:
      #   (1) install cargo-llvm-cov@0.8.5 — pinned to match the version used to
      #       seed coverage/baseline.json (TASK-017). taiki-e/install-action caches
      #       the binary between runs; avoids cold `cargo install` cost (~2 min).
      #   (2) run coverage-ratchet regression tests — verifies the ratchet script
      #       itself before trusting its output. A broken script silently passing
      #       is more dangerous than a broken script failing loudly.
      #   (3) generate coverage/current.json from the instrumented test run.
      #   (4) invoke ops/checks/coverage-ratchet.js — fails if any baseline file's
      #       current pct < baseline pct (with epsilon=0.05 for FP noise).
      #       A file absent from current (deleted) does not fail the ratchet.

      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.5

      - name: coverage-ratchet regression tests
        run: node ops/checks/__tests__/coverage-ratchet.test.js

      - name: generate coverage report
        run: cargo llvm-cov --json --output-path coverage/current.json

      - name: coverage ratchet
        run: node ops/checks/coverage-ratchet.js

      # ── waiver-expiry check ───────────────────────────────────────────────────
      # Runs after tests so the failure message is distinct from test failures.
      - name: waiver-expiry check
        if: hashFiles('docs/waivers.yaml') != '' && hashFiles('ops/checks/waiver-expiry-check.sh') != ''
        run: bash ops/checks/waiver-expiry-check.sh

  # ────────────────────────────────────────────────────────────────────────────
  # Job: hot-path-bench
  #
  # Wave 1 / TASK-116: runs `cargo test --features bench --test churn` against
  # the four audit-recommended scenarios (opi_profile_20w_2048e,
  # rpi_profile_32w_4096e, bursty_one_visible_change, reconnect_diff_full_cap)
  # on every PR that touches a hot-path file. The bench is the
  # `performance-engineer` agent's regression guard: from TASK-117 onwards,
  # every hot-path PR must compile and run this bench, and the agent compares
  # the per-scenario p50/p95 against `benches/baseline.json` thresholds.
  #
  # Trigger paths (matches CLAUDE.md cross-agent escalation matrix
  # "Hot-path file change" row):
  #   - src/ha/live_store.rs
  #   - src/ha/client.rs
  #   - src/ha/protocol.rs
  #   - src/ui/bridge.rs
  #   - benches/churn.rs        (the bench itself)
  #   - benches/baseline.json   (regenerated baseline must re-pass scenarios)
  #
  # We deliberately exclude the 60 s `churn_1000_entities_50_evs_holds_flush_cadence`
  # mock-WS scenario from the PR-gate run; that scenario is wall-clock-bound
  # and would push the PR budget past 5 minutes. It still lives in the file
  # and runs in nightly via cargo test --features bench (no name filter).
  #
  # Regression-threshold enforcement is the `performance-engineer` agent's
  # job (joint gate from TASK-117 onwards). This CI step verifies only that
  # the bench compiles AND runs to completion AND produces parser-friendly
  # BENCH-RESULT lines for all four scenarios. The agent reads the lines.
  #
  # Blast-radius: PRs touching the hot-path files. FP rate target: <1% — the
  # explicit warm-up + sample-count constants in churn.rs (Risk #9 mitigation
  # from docs/plans/2026-04-30-phase-7-performance.md) keep the variance
  # below the regression thresholds on a typical runner.
  # ────────────────────────────────────────────────────────────────────────────
  hot-path-bench:
    name: hot-path-bench (PR gate; TASK-116 / Wave 1)
    runs-on: ubuntu-latest
    needs: [lint, repo-rules]
    # Only run on pull_request and push events (not on schedule). Nightly
    # already exercises the bench via the test job's broader scope.
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    env:
      TZ: UTC
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@v4
        with:
          # We need history so dorny/paths-filter can compare base..head.
          fetch-depth: 0

      # ── Detect hot-path file changes ─────────────────────────────────────────
      # dorny/paths-filter@v3 produces an output `hotpath` that is `true` iff
      # the PR (or push) touches any of the listed files. The whole bench
      # toolchain install + cargo test step is gated on this output, so PRs
      # that don't touch hot paths skip the ~5–7 minute Slint-deps build.
      #
      # Why a separate job instead of an `if:` on a step in `test`?
      #   - Keeps the `test` job's runtime budget tight.
      #   - Surfaces the bench gate as a distinct required check name on PRs.
      #   - Lets `performance-engineer` cite `hot-path-bench` directly in
      #     `performance/approved` posts.
      - name: detect hot-path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            hotpath:
              - 'src/ha/live_store.rs'
              - 'src/ha/client.rs'
              - 'src/ha/protocol.rs'
              - 'src/ui/bridge.rs'
              - 'benches/churn.rs'
              - 'benches/baseline.json'

      # ── Rust toolchain (pinned to match dev VM per TASK-002) ──────────────────
      - name: setup Rust 1.95.0
        if: steps.filter.outputs.hotpath == 'true'
        uses: dtolnay/rust-toolchain@1.95.0

      # ── System libs required by Slint transitive deps ────────────────────────
      # Same set as the lint/test jobs. The bench compiles against the full
      # crate, including the Slint-derived bridge types, so these are required.
      - name: install Slint system deps
        if: steps.filter.outputs.hotpath == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev \
            libfreetype6-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxkbcommon-x11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libxinerama-dev \
            pkg-config \
            cmake

      # Cache cargo artifacts (separate key — release-mode compile is its own
      # universe and shouldn't share the lint/test debug-mode cache).
      - name: cache cargo artifacts (release)
        if: steps.filter.outputs.hotpath == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          key: hot-path-bench-release

      # ── Run the four audit-recommended scenarios in release mode ─────────────
      # We name each scenario explicitly so the 60 s mock-WS scenario
      # (`churn_1000_entities_50_evs_holds_flush_cadence`) is excluded — that
      # one is nightly-only and would blow the PR budget.
      #
      # `--release` matches the baseline-capture command annotated in
      # benches/baseline.json. Comparing release-mode samples against
      # debug-mode baseline (or vice versa) would produce false regressions.
      - name: cargo test --features bench (hot-path scenarios)
        if: steps.filter.outputs.hotpath == 'true'
        run: |
          cargo test --features bench --release --test churn -- --nocapture \
            opi_profile_20w_2048e \
            rpi_profile_32w_4096e \
            bursty_one_visible_change \
            reconnect_diff_full_cap

      # ── Skip notice for non-hot-path PRs ─────────────────────────────────────
      # Emits a single line in the job log so a reader can confirm the gate
      # decided to skip rather than silently passing. The job still posts a
      # green status check, which is correct: there is nothing to verify.
      - name: hot-path bench skipped (no hot-path file changes)
        if: steps.filter.outputs.hotpath != 'true'
        run: |
          echo "hot-path-bench: no changes to src/ha/{live_store,client,protocol}.rs,"
          echo "src/ui/bridge.rs, benches/churn.rs, or benches/baseline.json — skipping."

  # ────────────────────────────────────────────────────────────────────────────
  # Job: sbc-cpu-smoke
  #
  # Nightly (and manual) aarch64 QEMU CPU smoke for the WS + LiveStore hot path.
  # Gate: average CPU% during 60 s / 50 ev/s churn ≤ DEFAULT_PROFILE.cpu_smoke_budget_pct (30 %).
  #
  # NOT required on PR — run only on schedule or workflow_dispatch.
  # The 60 s churn window plus QEMU startup adds ~75 s to the runner; placing
  # this in the nightly budget keeps the PR wall-clock target (<5 min) intact.
  #
  # Blast-radius: nightly only. FP rate: <1% (budget is deliberately generous
  # at 30%; flaps only on gross regressions or runner resource contention).
  #
  # Toolchain: same pinned 1.95.0 as PR jobs. The cross target
  # (aarch64-unknown-linux-gnu) and QEMU user-static are installed fresh each
  # run; no additional cache layer is required because these are apt packages.
  # ────────────────────────────────────────────────────────────────────────────
  sbc-cpu-smoke:
    name: sbc-cpu-smoke (aarch64 QEMU)
    runs-on: ubuntu-latest
    # Run on nightly schedule and on manual dispatch; explicitly NOT on
    # pull_request or push so this job is never a PR required check.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    env:
      TZ: UTC
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@v4

      # ── Rust toolchain (pinned to match dev VM per TASK-002) ──────────────────
      - name: setup Rust 1.95.0
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: aarch64-unknown-linux-gnu

      # ── System libs for host build (Slint transitive deps) ───────────────────
      # Required so `cargo build --target aarch64-unknown-linux-gnu` can link
      # the host-side procedural macros and build scripts without errors.
      # The cross-linker (gcc-aarch64-linux-gnu) also lives here.
      - name: install cross-build system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            libfontconfig1-dev \
            libfreetype6-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxkbcommon-x11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libxinerama-dev \
            pkg-config \
            cmake

      # ── QEMU user-mode emulation ──────────────────────────────────────────────
      # qemu-user-static provides qemu-aarch64-static: a statically-linked
      # aarch64 user-mode emulator that runs aarch64 ELF binaries on x86_64.
      # binfmt-support + qemu-user-static together register the binfmt_misc
      # handler so the kernel automatically invokes qemu-aarch64-static for
      # aarch64 ELF executables — `./aarch64-binary` just works without an
      # explicit qemu invocation.
      - name: install QEMU user-static + binfmt
        run: |
          sudo apt-get install -y --no-install-recommends \
            qemu-user-static \
            binfmt-support
          # Confirm binfmt registration for aarch64.
          update-binfmts --display qemu-aarch64 || true

      # ── cargo cache ──────────────────────────────────────────────────────────
      - name: cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-sbc-smoke

      # ── Cross-build the sbc_smoke test binary ────────────────────────────────
      # --no-default-features is NOT set — we want the full feature set because
      # the smoke test exercises the real WsClient + LiveStore path, which
      # depends on tokio-tungstenite with TLS and Slint with software renderer.
      # The aarch64 linker is specified via CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER.
      - name: cross-build sbc_smoke binary (aarch64)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --target aarch64-unknown-linux-gnu --test sbc_smoke

      # ── Locate the compiled test binary ──────────────────────────────────────
      # The binary name contains a hash suffix (cargo's test binary naming).
      # We find it by looking for executables whose name starts with "sbc_smoke-".
      - name: locate sbc_smoke binary
        id: find-binary
        run: |
          BIN=$(find target/aarch64-unknown-linux-gnu/debug -maxdepth 1 \
                  -name 'sbc_smoke-*' -executable -type f | head -1)
          if [ -z "$BIN" ]; then
            echo "ERROR: could not find sbc_smoke test binary under target/aarch64-unknown-linux-gnu/debug/"
            exit 1
          fi
          echo "bin=$BIN" >> "$GITHUB_OUTPUT"

      # ── Run sbc_smoke under QEMU ──────────────────────────────────────────────
      # binfmt_misc handles the qemu-aarch64-static invocation automatically
      # when binfmt-support is installed and updated (done above).  We pass
      # the aarch64 sysroot so shared libs resolve correctly.
      #
      # Flags:
      #   --test-threads 1  — prevent concurrent test runs from inflating CPU%.
      #   --nocapture       — emit eprintln! measurements to the runner log.
      #
      # The 60 s churn window means this step takes ~75–90 s; that is well within
      # the 20 min nightly budget.
      - name: run sbc_smoke under QEMU (aarch64)
        env:
          TZ: UTC
          QEMU_LD_PREFIX: /usr/aarch64-linux-gnu
        run: |
          "${{ steps.find-binary.outputs.bin }}" \
            --test-threads 1 \
            --nocapture \
            sbc_cpu_smoke_50evs_60s_below_budget
